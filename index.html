<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ENC Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet & Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* ============ RIGHT SIDEBAR ============ */
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 260px;
            height: 100vh;
            background: #f7f7f7;
            border-left: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            z-index: 2000;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 18px;
        }

        #downloadBtn {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border: 1px solid #333;
            cursor: pointer;
            border-radius: 4px;
        }

        .enc-item {
            padding: 6px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* ============ MAP ============ */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - 260px);
            height: 100vh;
            z-index: 0;
        }

        /* Ensure Leaflet controls always work */
        .leaflet-control {
            z-index: 3000 !important;
            pointer-events: auto !important;
        }

        /* Tooltip styling */
        .enc-tooltip {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #666;
            border-radius: 4px;
            padding: 6px;
            font-size: 12px;
            color: #000;
            max-width: 300px;
        }
    </style>
</head>

<body>

<div id="sidebar">
    <h2>Selected ENCs</h2>
    <button id="downloadBtn">Download Selected Polygons</button>
    <div id="encList"></div>
</div>

<div id="map"></div>

<!-- Leaflet, Draw, Turf -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
/* ============ MAP INITIALIZATION ============ */
const map = L.map("map").setView([56.1304, -106.3468], 4);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* ============ DRAW CONTROLS ============ */
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

map.addControl(new L.Control.Draw({
    edit: { featureGroup: drawnItems },
    draw: {
        polygon: true,
        rectangle: true,
        polyline: true,
        marker: false,
        circle: false,
        circlemarker: false
    }
}));

/* ============ STATE ============ */
let encLayer;
let selected = [];
const LINE_BUFFER_METERS = 500;

/* ============ HELPERS ============ */
function highlight(layer) {
    layer.setStyle({ color: "yellow", weight: 3 });
}

function unhighlight(layer) {
    layer.setStyle({ color: "#3388ff", weight: 1 });
}

function isSelected(feature) {
    return selected.some(f => f.properties["Cell name"] === feature.properties["Cell name"]);
}

function buildTooltipContent(feature) {
    let html = `<strong>${feature.properties["Cell name"]}</strong><br>`;
    for (const key in feature.properties) {
        if (key !== "Cell name") {
            html += `${key}: ${feature.properties[key]}<br>`;
        }
    }
    return html;
}

function updateSidebar() {
    const list = document.getElementById("encList");
    list.innerHTML = "";

    selected.forEach(feature => {
        const div = document.createElement("div");
        div.className = "enc-item";

        div.innerHTML = `
            <span>${feature.properties["Cell name"]}</span>
            <button class="remove-btn">X</button>
        `;

        div.querySelector(".remove-btn").onclick = () => {
            selected = selected.filter(
                f => f.properties["Cell name"] !== feature.properties["Cell name"]
            );

            encLayer.eachLayer(l => {
                if (l.feature.properties["Cell name"] === feature.properties["Cell name"]) {
                    unhighlight(l);
                }
            });

            updateSidebar();
        };

        list.appendChild(div);
    });
}

/* ============ DRAW-END SELECTION ============ */
map.on(L.Draw.Event.CREATED, function (e) {
    drawnItems.clearLayers();
    drawnItems.addLayer(e.layer);

    let selectionGeom = e.layer.toGeoJSON();

    // Buffer line selections
    if (selectionGeom.geometry.type === "LineString" ||
        selectionGeom.geometry.type === "MultiLineString") {

        selectionGeom = turf.buffer(selectionGeom, LINE_BUFFER_METERS, {
            units: "meters"
        });
    }

    encLayer.eachLayer(layer => {
        const feature = layer.feature;
        if (turf.booleanIntersects(selectionGeom, feature)) {
            if (!isSelected(feature)) {
                selected.push(feature);
                highlight(layer);
            }
        }
    });

    updateSidebar();
});

/* ============ LOAD ENCs ============ */
fetch("data/ENCs.geojson")
    .then(r => r.json())
    .then(data => {
        encLayer = L.geoJSON(data, {
            style: { color: "#3388ff", weight: 1 },
            onEachFeature: (feature, layer) => {

                // Hover tooltip
                layer.bindTooltip(
                    buildTooltipContent(feature),
                    {
                        sticky: true,
                        opacity: 0.95,
                        className: "enc-tooltip"
                    }
                );

                // Click selection
                layer.on("click", () => {
                    if (isSelected(feature)) {
                        selected = selected.filter(
                            f => f.properties["Cell name"] !== feature.properties["Cell name"]
                        );
                        unhighlight(layer);
                    } else {
                        selected.push(feature);
                        highlight(layer);
                    }
                    updateSidebar();
                });
            }
        }).addTo(map);
    });

/* ============ DOWNLOAD ============ */
document.getElementById("downloadBtn").onclick = () => {
    if (!selected.length) {
        alert("No polygons selected!");
        return;
    }

    const fc = { type: "FeatureCollection", features: selected };
    const blob = new Blob([JSON.stringify(fc)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "selected_ENCs.geojson";
    a.click();
};
</script>

</body>
</html>
