<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>

    <!-- Correct way to load Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Correct way to load Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Make a map centered on Mont-Joli
    var map = L.map('map').setView([48.6, -68.2], 10);

    // Add a background map (OpenStreetMap)
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Add a marker
    L.marker([48.6, -68.2])
        .addTo(map)
        .bindPopup("Hello from Mont-Joli!");
</script>

</body>
</html>
