<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ENC Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet + plugins CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* ===============================
           RIGHT SIDEBAR (ENC selection)
        =============================== */
        #sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 260px;
            height: 100vh;
            background: #f7f7f7;
            border-left: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            z-index: 2000;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 18px;
        }

        #downloadBtn {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border: 1px solid #333;
            cursor: pointer;
            border-radius: 4px;
        }

        .enc-item {
            padding: 6px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* ===============================
           MAP (LEFT + CENTER)
        =============================== */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - 260px); /* leave space for sidebar */
            height: 100vh;
            z-index: 0;
        }

        /* ===============================
           LEAFLET CONTROLS FIX
        =============================== */
        .leaflet-control {
            z-index: 3000 !important;
            pointer-events: auto !important;
        }

    </style>
</head>

<body>

    <!-- RIGHT SIDEBAR -->
    <div id="sidebar">
        <h2>ENC sélectionnées</h2>
        <button id="downloadBtn">Download Selected Polygons</button>
        <div id="encList"></div>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- Leaflet + plugins JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script>
        /* ===============================
           MAP INITIALIZATION
        =============================== */
        const canadaCenter = [56.1304, -106.3468];
        const map = L.map("map").setView(canadaCenter, 4);

        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "© OpenStreetMap contributors"
        }).addTo(map);

        /* ===============================
           DRAW CONTROLS
        =============================== */
        let encLayer;
        let selected = [];

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: true,
                polyline: true,
                rectangle: true,
                circle: false,
                marker: true
            }
        });
        map.addControl(drawControl);

        /* ===============================
           SELECTION HELPERS
        =============================== */
        function highlight(layer) {
            layer.setStyle({ color: "yellow", weight: 3 });
        }

        function unhighlight(layer) {
            layer.setStyle({ color: "#3388ff", weight: 1 });
        }

        function isSelected(feature) {
            return selected.some(f => f.properties["Cell name"] === feature.properties["Cell name"]);
        }

        function toggleSelection(layer) {
            const feature = layer.feature;

            if (isSelected(feature)) {
                selected = selected.filter(f => f.properties["Cell name"] !== feature.properties["Cell name"]);
                unhighlight(layer);
            } else {
                selected.push(feature);
                highlight(layer);
            }

            updateSidebar();
        }

        /* ===============================
           SIDEBAR UPDATE
        =============================== */
        function updateSidebar() {
            const list = document.getElementById("encList");
            list.innerHTML = "";

            selected.forEach(feature => {
                const div = document.createElement("div");
                div.className = "enc-item";

                const name = feature.properties["Cell name"];

                div.innerHTML = `
                    <span>${name}</span>
                    <button class="remove-btn">X</button>
                `;

                div.querySelector(".remove-btn").onclick = () => removeFeature(feature);
                list.appendChild(div);
            });
        }

        function removeFeature(feature) {
            selected = selected.filter(f => f.properties["Cell name"] !== feature.properties["Cell name"]);

            encLayer.eachLayer(layer => {
                if (layer.feature.properties["Cell name"] === feature.properties["Cell name"]) {
                    unhighlight(layer);
                }
            });

            updateSidebar();
        }

        /* ===============================
           POPUPS
        =============================== */
        function buildPopupContent(feature) {
            let html = `<h3>${feature.properties["Cell name"]}</h3>`;
            for (const key in feature.properties) {
                html += `<b>${key}</b>: ${feature.properties[key]}<br>`;
            }
            return html;
        }

        /* ===============================
           LOAD ENC GEOJSON
        =============================== */
        fetch("data/ENCs.geojson")
            .then(r => r.json())
            .then(data => {
                encLayer = L.geoJSON(data, {
                    style: { color: "#3388ff", weight: 1 },
                    onEachFeature: (feature, layer) => {
                        layer.on("click", e => {
                            toggleSelection(layer);
                            layer.bindPopup(buildPopupContent(feature)).openPopup(e.latlng);
                        });
                    }
                }).addTo(map);
            });

        /* ===============================
           DOWNLOAD BUTTON
        =============================== */
        document.getElementById("downloadBtn").onclick = () => {
            if (selected.length === 0) {
                alert("No polygons selected!");
                return;
            }

            const fc = { type: "FeatureCollection", features: selected };
            const blob = new Blob([JSON.stringify(fc)], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "selected_polygons.geojson";
            a.click();
        };
    </script>

</body>
</html>
