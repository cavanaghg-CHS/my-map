<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>

    <!-- Leaflet CSS -->
    https://unpkg.com/leaflet/dist/leaflet.css

    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
https://unpkg.com/leaflet/dist/leaflet.js

<script>
    // Center map on CHS HQ at 200 Kent Street (no marker this time)
    var chsKent = [45.417127, -75.70153];

    var map = L.map('map').setView(chsKent, 17);

    // Basemap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Load your GeoJSON file ENCS.geojason
    fetch("data/ENCS.geojason")
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data).addTo(map);
        })
        .catch(err => console.log("Could not load ENCS.geojason:", err));
</script>

</body>
</html>
