<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>

    <!-- Leaflet CSS -->
    https://unpkg.com/leaflet/dist/leaflet.css

    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
https://unpkg.com/leaflet/dist/leaflet.js

<script>
    // Center map on all of Canada
    var canadaCenter = [56.1304, -106.3468];

    var map = L.map('map').setView(canadaCenter, 4);

    // Basemap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Load your GeoJSON file ENCs.geojson
    fetch("data/ENCs.geojson")
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data).addTo(map);
        })
        .catch(err => console.log("Could not load ENCs.geojson:", err));
</script>

</body>
</html>
