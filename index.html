<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // CHS Office Ottawa on Kent Street
    var chsKent = [45.417127, -75.70153];

    // Create map centered on Kent Street
    var map = L.map('map').setView(chsKent, 17);

    // Basemap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Marker with message
    L.marker(chsKent)
        .addTo(map)
        .bindPopup("hello kathryn!");
</script>

</body>
</html>
