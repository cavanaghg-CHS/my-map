<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>
    https://unpkg.com/leaflet/dist/leaflet.css
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

https://unpkg.com/leaflet/dist/leaflet.js
<script>
    // Make a map centered on Mont-Joli
    var map = L.map('map').setView([48.6, -68.2], 10);

    // Add a background map (OpenStreetMap)
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Add a point on the map
    L.marker([48.6, -68.2])
        .addTo(map)
        .bindPopup("Hello from Mont-Joli!");
</script>

</body>
</html>
