<!DOCTYPE html>
<html>
<head>
    <title>My Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Center the map on Canada
    var canadaCenter = [56.1304, -106.3468];
    var map = L.map('map').setView(canadaCenter, 4);

    // Basemap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    // Load your GeoJSON file ENCs.geojson
    fetch("data/ENCs.geojson")
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                onEachFeature: function (feature, layer) {
                    // Build popup with all attribute information
                    let props = feature.properties;
                    let html = "<b>Feature info</b><br>";

                    for (let key in props) {
                        html += key + ": " + props[key] + "<br>";
                    }

                    layer.bindPopup(html);
                }
            }).addTo(map);
        })
        .catch(err => console.error("Could not load ENCs.geojson:", err));
</script>

</body>
</html>
