<!DOCTYPE html>
<html>
<head>
    <title>ENC Viewer</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Sidebar: Selected ENC list */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #f7f7f7;
            border-right: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            z-index: 2000;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 18px;
        }

        .enc-item {
            padding: 6px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
        }

        /* Move Leaflet controls just outside the sidebar */
        .leaflet-top.leaflet-left {
            left: 265px !important;
        }

        /* Download button on the right */
        #downloadBtn {
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 1500;
            padding: 8px 14px;
            background: white;
            border: 1px solid #333;
            cursor: pointer;
            border-radius: 4px;
        }

        #map {
            position: absolute;
            top: 0;
            left: 260px;
            width: calc(100vw - 260px);
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>ENC sélectionnées</h2>
    <div id="encList"></div>
</div>

<button id="downloadBtn">Download Selected Polygons</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
    var canadaCenter = [56.1304, -106.3468];
    var map = L.map('map').setView(canadaCenter, 4);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    let encLayer;
    let selected = [];
    let drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: {
            polygon: true,
            polyline: true,
            rectangle: true,
            circle: false,
            marker: true
        }
    });
    map.addControl(drawControl);

    function highlight(layer) {
        layer.setStyle({ color: "yellow", weight: 3 });
    }

    function unhighlight(layer) {
        layer.setStyle({ color: "#3388ff", weight: 1 });
    }

    function isSelected(feature) {
        return selected.some(f => f.properties.ID === feature.properties.ID);
    }

    function toggleSelection(layer) {
        const feature = layer.feature;

        if (isSelected(feature)) {
            selected = selected.filter(f => f.properties.ID !== feature.properties.ID);
            unhighlight(layer);
        } else {
            selected.push(feature);
            highlight(layer);
        }

        updateSidebar();
    }

    function updateSidebar() {
        const list = document.getElementById("encList");
        list.innerHTML = "";

        selected.forEach(feature => {
            const div = document.createElement("div");
            div.className = "enc-item";

            /* Correct field: "Cell name" */
            const name =
                feature.properties["Cell name"] ||
                feature.properties.CELL_NAME ||
                feature.properties.NAME ||
                feature.properties.DSNM ||
                feature.properties.ID ||
                "ENC";

            div.innerHTML = `
                <span>${name}</span>
                <button class="remove-btn">X</button>
            `;

            div.querySelector(".remove-btn").onclick = () => {
                removeFeature(feature);
            };

            list.appendChild(div);
        });
    }

    function removeFeature(feature) {
        selected = selected.filter(f => f.properties.ID !== feature.properties.ID);

        encLayer.eachLayer(layer => {
            if (layer.feature.properties.ID === feature.properties.ID) {
                unhighlight(layer);
            }
        });

        updateSidebar();
    }

    function buildPopupContent(feature) {
        let html = "";

        const title =
            feature.properties["Cell name"] ||
            feature.properties.CELL_NAME ||
            feature.properties.NAME ||
            feature.properties.DSNM ||
            "ENC";

        html += `<h3>${title}</h3>`;

        for (const key in feature.properties) {
            html += `<b>${key}</b>: ${feature.properties[key]}<br>`;
        }

        return html;
    }

    fetch("data/ENCs.geojson")
        .then(r => r.json())
        .then(data => {
            encLayer = L.geoJSON(data, {
                style: { color: "#3388ff", weight: 1 },
                onEachFeature: function (feature, layer) {

                    layer.on("mouseover", function () {
                        if (!isSelected(feature)) {
                            layer.setStyle({ weight: 3 });
                        }
                    });

                    layer.on("mouseout", function () {
                        if (!isSelected(feature)) {
                            layer.setStyle({ weight: 1 });
                        }
                    });

                    layer.on("click", function (e) {
                        toggleSelection(layer);

                        const popupContent = buildPopupContent(feature);
                        layer.bindPopup(popupContent).openPopup(e.latlng);
                    });
                }
            }).addTo(map);
        });

    map.on(L.Draw.Event.CREATED, function(e) {
        var layer = e.layer;
        drawnItems.addLayer(layer);
        var drawnGeo = layer.toGeoJSON();

        encLayer.eachLayer(function(encFeatureLayer) {
            var encGeo = encFeatureLayer.toGeoJSON();

            if (turf.booleanIntersects(drawnGeo, encGeo)) {
                if (!isSelected(encGeo)) {
                    selected.push(encGeo);
                    highlight(encFeatureLayer);
                }
            }
        });

        updateSidebar();
    });

    document.getElementById("downloadBtn").onclick = function () {
        if (selected.length === 0) {
            alert("No polygons selected!");
            return;
        }

        let fc = { type: "FeatureCollection", features: selected };

        let blob = new Blob([JSON.stringify(fc)], { type: "application/json" });
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "selected_polygons.geojson";
        a.click();
    };
</script>

</body>
</html>
